name: Build Raylib Project

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Generate Visual Studio Solution
        shell: cmd
        run: |
          # This runs the batch file from your instructions
          call build-VisualStudio2022.bat

      - name: Build Project
        shell: cmd
        run: |
          # MSBuild will find the .sln file generated by Premake
          msbuild *.sln /p:Configuration=Release

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: bin/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Makefiles
        run: |
          cd build
          chmod +x premake5.osx
          ./premake5.osx gmake

      - name: Build Project
        run: make config=release

      - name: Upload MacOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: bin/
